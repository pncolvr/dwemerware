name: Pack and publish NuGet Packages

on:
  workflow_call:
    inputs:
      packages:
        description: >
          Newline-separated list of project directories to pack, in dependency
          order (dependents before their consumers).
        required: true
        type: string
      dotnet-version:
        description: .NET SDK version
        required: false
        type: string
        default: '8.0.x'
      tag-prefix:
        description: Git tag prefix used when searching for the previous release
        required: false
        type: string
        default: 'v'
      default-bump:
        description: >
          Default semver segment to bump when no conventional-commit hints are
          present (major | minor | patch).
        required: false
        type: string
        default: patch
      nuget-source-name:
        description: Friendly name for the NuGet source entry in the local config
        required: false
        type: string
        default: github-packages

permissions:
  contents: write
  packages: write

jobs:
  pack_publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: ${{ inputs.default-bump }}
          TAG_PREFIX: ${{ inputs.tag-prefix }}
          DRY_RUN: true
          VERBOSE: true
          FORCE_WITHOUT_CHANGES: true

      - name: Normalize package version
        id: version_number
        shell: bash
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
          TAG_PREFIX: ${{ inputs.tag-prefix }}
        run: |
          set -euo pipefail
          version="$NEW_TAG"
          if [[ -n "${TAG_PREFIX:-}" && "$version" == "$TAG_PREFIX"* ]]; then
            version="${version#"$TAG_PREFIX"}"
          fi

          if [[ -z "$version" ]]; then
            echo "Unable to derive package version from tag: '${NEW_TAG:-<empty>}'"
            exit 1
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved tag='$NEW_TAG' version='$version'"
          
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Configure NuGet source
        shell: bash
        run: |
          set -euo pipefail
          nuget_url="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget remove source "${{ inputs.nuget-source-name }}" >/dev/null 2>&1 || true
          dotnet nuget add source "$nuget_url" \
            --name "${{ inputs.nuget-source-name }}" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text

      - name: Pack packages
        shell: bash
        env:
          NEW_VERSION: ${{ steps.version_number.outputs.value }}
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/output"

          echo "New version: ${NEW_VERSION:-<empty>}"
          echo "Packages input:"
          printf '%s\n' "${{ inputs.packages }}"
          echo "----"

          while IFS= read -r project_dir; do
            [[ -z "${project_dir// }" ]] && continue
            echo ">>> Packing $project_dir"
            dotnet restore "$project_dir"
            dotnet pack "$project_dir" \
              --configuration Release \
              --output "$GITHUB_WORKSPACE/output" \
              -p:Version="$NEW_VERSION"
          done <<< "${{ inputs.packages }}"

      - name: Publish packages to GitHub Packages
        shell: bash
        run: |
          set -euo pipefail
          nuget_url="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push "$GITHUB_WORKSPACE/output"/*.nupkg \
            --source "$nuget_url" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: ${{ steps.version.outputs.new_tag }}
          generate_release_notes: true
          files: output/*.nupkg
